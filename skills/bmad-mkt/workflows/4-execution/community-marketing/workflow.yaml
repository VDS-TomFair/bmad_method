# Community Marketing Workflow

## Overview
Build and leverage online communities to drive product growth and brand loyalty. Covers community strategy, platform selection, launch playbooks, ambassador programs, and community health metrics.

## Content Coverage
- Community strategy principles (shared identity, value flow, flywheel)
- Playbooks by goal (launch from zero, grow existing, ambassador program, community-led support)
- Platform selection guide (Discord, Slack, Circle, Reddit, Facebook, Discourse)
- Community health metrics and warning signs
- Channel architecture and member journey design

