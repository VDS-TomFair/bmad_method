  args: skills/bmad-init/core/workflows/brainstorming/workflow.md
  phase: anytime
  after: ''
  before: ''
  required: false
  output-location: '{output_folder}/brainstorming/brainstorming-session-{{date}}.md'
  outputs: ''
- module: core
  skill: party-mode facilitator
  display-name: Party Mode
  menu-code: PM
  description: Orchestrate multi-agent discussions. Use when you need multiple agent perspectives or want agents to collaborate.
  action: ''
  args: skills/bmad-init/core/workflows/party-mode/workflow.md
  phase: anytime
  after: ''
  before: ''
  required: false
  output-location: ''
  outputs: ''
- module: core
