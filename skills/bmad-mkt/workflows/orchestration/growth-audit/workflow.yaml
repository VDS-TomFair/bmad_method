# Growth Audit Orchestration

## Overview
Conduct a full-funnel growth audit analyzing traffic, conversion, retention, and revenue metrics to identify the highest-leverage optimization opportunities.

## Content Coverage
- Full funnel analysis (visit → signup → activate → convert → retain → expand)
- Channel performance comparison across organic, paid, email, and social
- Conversion rate analysis at each funnel stage
- Cohort analysis for retention and churn patterns
- Prioritized optimization roadmap with ICE scoring

