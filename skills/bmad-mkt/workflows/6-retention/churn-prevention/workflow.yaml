# Churn Prevention Workflow

## Overview
Reduce both voluntary and involuntary churn through cancel flow design, dynamic save offers, proactive retention signals, and dunning strategies.

## Content Coverage
- Cancel flow design (exit surveys, dynamic save offers, UI patterns)
- Churn prediction and proactive retention (risk signals, health scores, interventions)
- Involuntary churn: payment recovery (dunning stack, smart retries, email sequences)
- Metrics, measurement, and A/B testing

